name: fuzz
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzJSONDecodeSingle
          - FuzzJSONDecodeMultiple
          - FuzzProtobufDecode
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Fuzz
        run: go test -run=^$ -fuzz=^${{ matrix.target }}$ -fuzztime=5m
      - name: Upload failing corpus
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: testdata/fuzz
